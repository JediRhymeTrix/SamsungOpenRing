name: Release Drafter

on:
  push:
    branches:
      - master
      - main
  pull_request:
    types:
      - closed

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-drafter-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect build-relevant changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      android: ${{ steps.filter.outputs.android }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            android:
              - '.github/workflows/release-drafter.yml'
              - '.github/release-drafter.yml'
              - '*.gradle.kts'
              - 'gradle.properties'
              - 'gradlew'
              - 'gradlew.bat'
              - 'gradle/**'
              - 'app/**'
              - 'core/**'
              - 'tasker-plugin/**'

  update-release-draft:
    name: Update release notes draft
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Update draft release
        id: release-drafter
        uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-attach-apk:
    name: Build and attach APK to draft
    needs:
      - changes
      - update-release-draft
    if: github.event_name == 'push' && needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: samsung-open-ring-release-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Find latest draft release tag
        id: draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag=$(gh release list --repo "$GITHUB_REPOSITORY" --json isDraft,createdAt,tagName --jq 'map(select(.isDraft == true)) | sort_by(.createdAt) | reverse | .[0].tagName')
          if [ -z "$tag" ] || [ "$tag" = "null" ]; then
            echo "No draft release found" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Attach APKs to draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.draft.outputs.tag }}
          draft: true
          generate_release_notes: false
          files: app/build/outputs/apk/release/*.apk
