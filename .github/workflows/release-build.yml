name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create/update, e.g. v1.0.0'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Build release APKs
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Restore signing key
        env:
          OPENRING_KEYSTORE_BASE64: ${{ secrets.OPENRING_KEYSTORE_BASE64 }}
          OPENRING_KEYSTORE_PASSWORD: ${{ secrets.OPENRING_KEYSTORE_PASSWORD }}
          OPENRING_KEY_ALIAS: ${{ secrets.OPENRING_KEY_ALIAS }}
          OPENRING_KEY_PASSWORD: ${{ secrets.OPENRING_KEY_PASSWORD }}
        run: |
          if [ -z "$OPENRING_KEYSTORE_BASE64" ]; then
            echo "OPENRING_KEYSTORE_BASE64 secret is required for release builds" >&2
            exit 1
          fi
          echo "$OPENRING_KEYSTORE_BASE64" | base64 --decode > release-keystore.jks
          printf '%s\n' \
            'storeFile=release-keystore.jks' \
            "storePassword=$OPENRING_KEYSTORE_PASSWORD" \
            "keyAlias=$OPENRING_KEY_ALIAS" \
            "keyPassword=$OPENRING_KEY_PASSWORD" \
            > keystore.properties

      - name: Build release APK
        run: ./gradlew --no-daemon -PVERSION_CODE=${{ github.run_number }} :app:assembleRelease

      - name: Name release APK
        run: ./gradlew --no-daemon -PVERSION_CODE=${{ github.run_number }} :app:renameReleaseApk

      - name: Remove unsigned release APK
        run: rm -f app/build/outputs/apk/release/app-release.apk

      - name: Verify release APK signatures
        run: |
          APKS=(app/build/outputs/apk/release/SamsungOpenRing-*.apk)
          if [ ! -e "${APKS[0]}" ]; then
            echo "No renamed release APK found" >&2
            exit 1
          fi

          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -n 1)"
          for apk in "${APKS[@]}"; do
            "$APKSIGNER" verify --verbose --print-certs "$apk"
          done

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: samsung-open-ring-release-${{ github.run_number }}
          path: app/build/outputs/apk/release/SamsungOpenRing-*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Remove existing release APK assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          gh release view "$RELEASE_TAG" --json assets -q '.assets[].name' \
            | grep -E '\.apk$' \
            | xargs -r -I {} gh release delete-asset "$RELEASE_TAG" "{}" -y

      - name: Attach APKs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          draft: true
          generate_release_notes: true
          files: app/build/outputs/apk/release/SamsungOpenRing-*.apk
