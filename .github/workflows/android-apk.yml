name: Android Build

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - '.github/workflows/android-apk.yml'
      - '*.gradle.kts'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - 'gradle/**'
      - 'app/**'
      - 'core/**'
      - 'tasker-plugin/**'
  push:
    branches:
      - master
      - main
    paths:
      - '.github/workflows/android-apk.yml'
      - '*.gradle.kts'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - 'gradle/**'
      - 'app/**'
      - 'core/**'
      - 'tasker-plugin/**'

permissions:
  contents: read

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect build-relevant changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      android: ${{ steps.filter.outputs.android }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            android:
              - '.github/workflows/android-apk.yml'
              - '*.gradle.kts'
              - 'gradle.properties'
              - 'gradlew'
              - 'gradlew.bat'
              - 'gradle/**'
              - 'app/**'
              - 'core/**'
              - 'tasker-plugin/**'

  build:
    name: Build debug APK
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Restore signing key
        env:
          OPENRING_KEYSTORE_BASE64: ${{ secrets.OPENRING_KEYSTORE_BASE64 }}
          OPENRING_KEYSTORE_PASSWORD: ${{ secrets.OPENRING_KEYSTORE_PASSWORD }}
          OPENRING_KEY_ALIAS: ${{ secrets.OPENRING_KEY_ALIAS }}
          OPENRING_KEY_PASSWORD: ${{ secrets.OPENRING_KEY_PASSWORD }}
        run: |
          if [ -n "$OPENRING_KEYSTORE_BASE64" ]; then
            echo "$OPENRING_KEYSTORE_BASE64" | base64 --decode > release-keystore.jks
            printf '%s\n' \
              'storeFile=release-keystore.jks' \
              "storePassword=$OPENRING_KEYSTORE_PASSWORD" \
              "keyAlias=$OPENRING_KEY_ALIAS" \
              "keyPassword=$OPENRING_KEY_PASSWORD" \
              > keystore.properties
          fi

      - name: Build APK
        run: ./gradlew --no-daemon -PVERSION_CODE=${{ github.run_number }} :app:assembleDebug

      - name: Name APK
        run: ./gradlew --no-daemon -PVERSION_CODE=${{ github.run_number }} :app:renameDebugApk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: samsung-open-ring-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
